version: 1

github:
  enabled: true
  owner: SuperJMN
  repo: DotnetFleet
  token:
    from: env
    name: GITHUB_TOKEN
  outputDir: artifacts
  packages:
    - project: src/DotnetFleet.Desktop/DotnetFleet.Desktop.csproj
      formats:
        - type: appimage
          arch: [x64, arm64]
        - type: deb
          arch: [x64]
        - type: exe-setup
          arch: [x64]
        - type: dmg
          arch: [x64, arm64]
    - project: src/DotnetFleet.Android/DotnetFleet.Android.csproj
      formats:
        - type: Apk
          arch: [arm64]
          signing:
            keystore:
              from: env
              name: ANDROID_KEYSTORE_BASE64
              encoding: base64
            storePassword:
              from: env
              name: ANDROID_SIGNING_STORE_PASS
            keyAlias: android
            keyPassword:
              from: env
              name: ANDROID_SIGNING_KEY_PASS

nuget:
  enabled: true
  source: https://api.nuget.org/v3/index.json
  apiKey:
    from: env
    name: NUGET_API_KEY
  packages:
    - project: src/DotnetFleet.Tool/DotnetFleet.Tool.csproj
